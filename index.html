<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic config -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Project title -->
    <title>SeatPicker</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔝 HEADER -->
    <header class="header">

        <div class="header-left">
            <h1>SeatPicker</h1>
        </div>

        <div class="header-center">
            <span>Movie: Movie Title</span>
            <span>Time: 18:30</span>
            <span>Room: 5</span>
            <span>Language: EN / PT</span>
        </div>

    </header>

    <!-- 🧱 MAIN CONTENT -->
    <main class="container">

        <!-- 🎟️ SEAT MAP -->
        <section class="seat-map">

            <!-- Controls -->
            <div class="controls">
                <button class="zoom-in">+</button>
                <button class="zoom-out">-</button>
                <button class="reset">⟳</button>
            </div>

            <!-- Screen -->
            <div class="screen">
                SCREEN
            </div>

            <!-- Seats (next step) -->
            <div class="seats-container">
                <!-- Rows and seats will go here -->
            </div>

        </section>

        <!-- 🧾 SUMMARY -->
        <aside class="summary">

            <h2>Your Selection</h2>

            <p>Seats: A1, A2, B3</p>
            <p>Quantity: 3</p>
            <p>Price per ticket: $20</p>

            <hr>

            <h3>Total: $60</h3>

            <button class="confirm-btn">
                Confirm Selection
            </button>

            <!-- Legend -->
            <div class="legend">
                <p>○ Available</p>
                <p>● Occupied</p>
                <p>🔵 Selected</p>
            </div>

        </aside>

    </main>

</body>
</html>
